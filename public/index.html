<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f7f5" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="description" content="每日热洞监控公开只读快照" />
    <title>每日热洞监控 · 公开快照</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand-block">
          <h1>每日热洞监控</h1>
          <p id="subtitle">正在读取静态快照</p>
        </div>
        <div class="top-actions">
          <div id="liveBadge" class="status-badge">读取快照</div>
        </div>
      </header>

      <main>
        <section class="overview-band" aria-label="快照概览">
          <div class="metric-grid" id="metrics"></div>
          <button id="roundDetailsBtn" class="details-button" type="button" aria-expanded="false" aria-controls="roundDetails">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            <span>快照详情</span>
            <svg class="details-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
          </button>
          <div id="roundDetails" class="round-details" hidden></div>
        </section>

        <nav class="mobile-view-tabs" aria-label="内容视图">
          <button type="button" data-mobile-view="rank" aria-pressed="true">榜单</button>
          <button type="button" data-mobile-view="detail" aria-pressed="false">详情</button>
        </nav>

        <section class="workspace">
          <aside class="day-panel">
            <div class="panel-title">
              <div>
                <p class="panel-kicker">DAILY ARCHIVE</p>
                <h2>日期</h2>
              </div>
              <span id="dayCount">0 天</span>
            </div>
            <div class="day-navigator">
              <button id="olderDayBtn" class="day-step-button" type="button" title="较早一天" aria-label="较早一天">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6" /></svg>
              </button>
              <label class="day-select-wrap">
                <span class="sr-only">选择日期</span>
                <select id="daySelect" aria-label="选择日期"></select>
              </label>
              <button id="newerDayBtn" class="day-step-button" type="button" title="较新一天" aria-label="较新一天">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
              </button>
            </div>
            <div class="day-summary" id="daySummary"></div>
            <div class="chart-wrap">
              <canvas id="heatChart" aria-label="当日榜单热度图"></canvas>
            </div>
          </aside>

          <section class="rank-panel mobile-panel active" data-mobile-panel="rank">
            <div class="panel-title">
              <div>
                <p class="panel-kicker">HOT RANKING</p>
                <h2 id="rankTitle">榜单</h2>
              </div>
              <span id="rankCount">0 条</span>
            </div>
            <div class="rank-list" id="rankList"></div>
          </section>

          <section class="detail-panel mobile-panel" data-mobile-panel="detail">
            <div class="detail-head">
              <div class="detail-heading">
                <p class="eyebrow" id="detailEyebrow">未选择</p>
                <h2 id="detailTitle">等待榜单数据</h2>
              </div>
              <div id="detailHeat" class="heat-token" title="当前热度">0</div>
            </div>
            <div id="postBody" class="post-body"></div>
            <div class="comment-toolbar">
              <label class="search-box">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7" />
                  <path d="m16 16 4 4" />
                </svg>
                <input id="commentSearch" type="search" placeholder="搜索评论、楼层或身份" />
              </label>
              <label class="filter-toggle">
                <input id="referencedOnlyCheckbox" type="checkbox" />
                <span>只看引用</span>
              </label>
              <span id="commentCount" class="muted-count">0</span>
            </div>
            <div id="commentsList" class="comments-list"></div>
          </section>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./assets/vercel-analytics.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
