name: Validate static snapshot site

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run snapshot tests
        run: python -m unittest discover -s tests -v
      - name: Validate placeholder snapshot
        run: python -m json.tool public/data/snapshot.json > /dev/null
      - name: Build Cloudflare Pages output
        run: python scripts/build_site.py
      - name: Assert the public artifact has no management controls
        run: |
          ! grep -R -E '/api/(settings|refresh|export|backfill)|settingsDrawer|password|login_token' dist
