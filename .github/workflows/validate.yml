name: Validate Vercel static snapshot site

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run snapshot tests
        run: python -m unittest discover -s tests -v
      - name: Validate placeholder snapshot
        run: python scripts/validate_public_snapshot.py public/data/snapshot.json
      - name: Validate Vercel configuration
        run: |
          python -m json.tool vercel.json > /dev/null
          python -c "import json; assert json.load(open('vercel.json'))['outputDirectory'] == 'public'"
      - name: Assert the public artifact has no management controls
        run: |
          ! grep -R -E '/api/(settings|refresh|export|backfill)|settingsDrawer|password|login_token|cloudflare' public vercel.json
